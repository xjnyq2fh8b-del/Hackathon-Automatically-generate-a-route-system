services:
  - type: web
    name: westlake-route-agent-backend
    runtime: python
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: LLM_PROVIDER
        value: openai_compatible
      - key: LLM_ENABLED
        value: "true"
      - key: FRONTEND_ORIGIN
        sync: false
      - key: ENABLE_DOCS
        value: "false"
